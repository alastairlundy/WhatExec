name: Publish Packages to Nuget

on:
  workflow_dispatch:
     inputs:
      core-version:
         type: string
         required: true
      main-version:
        type: string
        required: true
      dependencyinjection-version:
        type: string
        required: true

permissions:
  contents: read

jobs:
  build-and-publish:
      runs-on: ubuntu-latest
  
      permissions:
        id-token: write 
      environment: production
        
      steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Create local nupkg output dir
        run: mkdir -p ./nupkgs

      # Build Abstractions
      - name: Build Abstractions
        run: dotnet build src/WhatExec.Lib.Abstractions -c Release

      # Pack Abstractions into ./nupkgs
      - name: Pack Abstractions to local feed
        run: dotnet pack src/WhatExec.Lib.Abstractions -c Release -o ./nupkg

      # Use local feed for WhatExec.Lib
      - name: Restore WhatExec.Lib from local feed + NuGet.org
        run: dotnet restore src/WhatExec.Lib -s ./nupkgs -s https://api.nuget.org/v3/index.json

      - name: Build WhatExec.Lib (resolves Abstractions from local feed)
        run: dotnet build src/WhatExec.Lib -c Release -p:AbstractionsVersion=${{ inputs.core-version }}

      # Use local feed for extensions
      - name: Restore Extensions from local feed + NuGet.org
        run: dotnet restore src/WhatExec.Lib.Extensions.DependencyInjection -s ./nupkgs -s https://api.nuget.org/v3/index.json

      - name: Build Extensions (resolves Abstractions and Main from local feed)
        run: dotnet build src/WhatExec.Lib.Extensions.DependencyInjection -c Release -p:AbstractionsVersion=${{ inputs.core-version }} -p:WhatExecLibVersion=${{ inputs.main-version }}

      # Use local feed for WhatExec.Cli.Lite
      - name: Restore Cli Lite from local feed + NuGet.org
        run: dotnet restore src/WhatExec.Cli.Lite -s ./nupkgs -s https://api.nuget.org/v3/index.json

      - name: Build Extensions (resolves Abstractions, Main, and DI version from local feed)
        run: dotnet build src/WhatExec.Cli.Lite -c Release -p:AbstractionsVersion=${{ inputs.core-version }} -p:WhatExecLibVersion=${{ inputs.main-version }} -p:DependencyInjectionPackageVersion=${{ inputs.dependencyinjection-version }}

      # Use local feed for WhatExec.Cli
      - name: Restore Cli Lite from local feed + NuGet.org
        run: dotnet restore src/WhatExec.Cli -s ./nupkgs -s https://api.nuget.org/v3/index.json

      - name: Build Extensions (resolves Abstractions, Main, and DI version from local feed)
        run: dotnet build src/WhatExec.Cli -c Release -p:AbstractionsVersion=${{ inputs.core-version }} -p:WhatExecLibVersion=${{ inputs.main-version }} -p:DependencyInjectionPackageVersion=${{ inputs.dependencyinjection-version }}

      # Pack the builds to ./nupkgs as well (so all resulting nupkgs end up in ./nupkgs)
      - name: Pack Specializations and Main into local feed
        run: |
          dotnet pack src/WhatExec.Lib -c Release -o ./nupkgs /p:AbstractionsVersion=${{ inputs.core-version }}
          dotnet pack src/WhatExec.Lib.Extensions.DependencyInjection -c Release -o ./nupkgs /p:AbstractionsVersion=${{ inputs.core-version }}  -p:WhatExecLibVersion=${{ inputs.main-version }}
          dotnet pack src/WhatExec.Cli.Lite -c Release -o ./nupkgs /p:AbstractionsVersion=${{ inputs.core-version }}  -p:WhatExecLibVersion=${{ inputs.main-version }}   -p:DependencyInjectionPackageVersion=${{ inputs.dependencyinjection-version }}
          dotnet pack src/WhatExec.Cli -c Release -o ./nupkgs /p:AbstractionsVersion=${{ inputs.core-version }}  -p:WhatExecLibVersion=${{ inputs.main-version }}   -p:DependencyInjectionPackageVersion=${{ inputs.dependencyinjection-version }}
        
          # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
            user: ${{ secrets.NUGET_USER }}
      
      # Push all nupkgs (no sleeps needed)
      - name: Push all nupkgs to NuGet.org
        run: |
          for f in ./nupkgs/*.nupkg; do
            dotnet nuget push "$f" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
